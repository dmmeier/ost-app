services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ost-postgres
    environment:
      POSTGRES_DB: ost
      POSTGRES_USER: ost_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ost_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ost_user -d ost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend (FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ost-backend
    environment:
      DATABASE_URL: postgresql://ost_user:${POSTGRES_PASSWORD:-ost_password_change_me}@postgres:5432/ost
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ost-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
