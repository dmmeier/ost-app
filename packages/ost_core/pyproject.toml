[project]
name = "ost-core"
version = "0.1.0"
description = "Core library for Opportunity Solution Trees"
requires-python = ">=3.12"
dependencies = [
    "anthropic==0.84.0",
    "google-genai==1.65.0",
    "openai==2.24.0",
    "pydantic==2.12.5",
    "pydantic-settings==2.13.1",
    "sqlalchemy==2.0.47",
    "psycopg2-binary==2.9.11",
    "typer==0.24.1",
    "rich==14.3.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ost_core"]
